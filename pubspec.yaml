name: buskirala_ekip
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+13

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  http: ^1.6.0
  shared_preferences: ^2.2.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/favicon-png.png
    - assets/buskirala-logo.png
    - assets/Logo-Beyaz.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/favicon-png.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: "assets/favicon-png.png"